<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GoGetta GG</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f17;color:#fff}

/* AUTH */
.auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0f17;z-index:999}
.box{background:#111827;padding:20px;border-radius:12px;display:flex;flex-direction:column;gap:10px}
input,button{padding:10px;border-radius:8px;border:none}
button{background:#2563eb;color:#fff}

/* NAV */
.nav{display:flex;flex-wrap:wrap;gap:6px;padding:10px}
.nav button{background:#1f2937}

/* TABS */
.tab{display:none;padding:15px}
.active{display:block}

/* CARDS */
.card{background:#111827;padding:10px;border-radius:10px;margin:6px 0}

/* FLEX */
.flex{display:flex;gap:15px}

/* CHECK */
.green{color:#22c55e}
.red{color:#ef4444}

/* SKILL TREE */
.node{border:1px solid #333;padding:6px;border-radius:8px;margin:4px;display:inline-block}
.row{display:flex;overflow-x:auto;gap:10px}

/* CALENDAR */
.day{border:1px solid #333;width:14%;min-height:80px;padding:4px}
.cal{display:flex;flex-wrap:wrap}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="auth">
  <div class="box">
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <div id="msg"></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="tab('profile')">👤</button>
<button onclick="tab('skills')">📊</button>
<button onclick="tab('skillsmap')">🧭</button>
<button onclick="tab('missions')">🎯</button>
<button onclick="tab('habits')">♻️</button>
<button onclick="tab('goals')">🏆</button>
<button onclick="tab('calendar')">📅</button>
<button onclick="tab('appointments')">📍</button>
<button onclick="tab('checklists')">✅</button>
<button onclick="tab('notes')">📝</button>
<button onclick="logout()">🚪</button>
</div>

<!-- PROFILE -->
<div id="profile" class="tab active">
<h2>Profile</h2>
<div id="combat"></div>
</div>

<!-- SKILLS -->
<div id="skills" class="tab">
<h2>Mainskills</h2>
<div id="skillsList"></div>
</div>

<!-- SKILLSMAP -->
<div id="skillsmap" class="tab">
<h2>Skills Map</h2>
<div class="row" id="r1"></div>
<div class="row" id="r2"></div>
</div>

<!-- APPOINTMENTS -->
<div id="appointments" class="tab">
<input id="atxt"><input type="date" id="adate">
<button onclick="addAppt()">Add</button>
<div id="alist"></div>
</div>

<!-- CHECKLIST -->
<div id="checklists" class="tab">
<div class="flex">
<div>
<button onclick="newList()">+Checklist</button>
<div id="cl"></div>
</div>
<div>
<h3>Finished</h3>
<div id="done"></div>
</div>
</div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="tab">
<div class="cal" id="cal"></div>
</div>

<!-- NOTES -->
<div id="notes" class="tab">
<textarea id="nt" style="width:100%;height:200px"></textarea>
<button onclick="save()">Save</button>
</div>

<script>

/* STATE */
let user=null;
let state={
skills:{},
checklists:[],
appointments:[],
notes:""
};

/* SKILLS INIT */
const MS=["SOC","MEN","FIN","PHY","LEA","APP","DIE","SCH","HOM","CAR","SID","BUS","HOB","WOR","DAT"];
MS.forEach(s=>state.skills[s]={name:s,subs:[]});

/* AUTH */
function register(){
let us=JSON.parse(localStorage.users||"{}");
us[u.value]={p:p.value,data:null};
localStorage.users=JSON.stringify(us);
msg.innerText="registered";
}

function login(){
let us=JSON.parse(localStorage.users||"{}");
if(us[u.value]&&us[u.value].p==p.value){
user=u.value;
localStorage.current=user;
load();
auth.style.display="none";
}else msg.innerText="wrong";
}

function logout(){localStorage.removeItem("current");location.reload()}

function init(){
if(localStorage.current){
user=localStorage.current;
load();
auth.style.display="none";
}
}

/* SAVE LOAD */
function save(){
let us=JSON.parse(localStorage.users||"{}");
us[user].data=state;
localStorage.users=JSON.stringify(us);
}

function load(){
let us=JSON.parse(localStorage.users||"{}");
if(us[user].data)state=us[user].data;
render();
}

/* TABS */
function tab(t){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
}

/* SKILLS */
function renderSkills(){
skillsList.innerHTML="";
for(let k in state.skills){
let s=state.skills[k];
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<b>${k}</b><button onclick="addSub('${k}')">+</button>`;

s.subs.forEach(sub=>{
let d=document.createElement("div");
d.className="node";
d.innerHTML=sub.name;

sub.items?.forEach(i=>{
let span=document.createElement("div");
span.innerHTML=i.name;
d.appendChild(span);
});

div.appendChild(d);
});

skillsList.appendChild(div);
}
}

function addSub(k){
let name=prompt("subskill");
state.skills[k].subs.push({name,items:[]});
save();render();
}

/* MISSIONS / HABITS beside subskills */
function addItem(sub){
let n=prompt("mission/habit");
sub.items.push({name:n});
save();render();
}

/* SKILLSMAP */
function renderMap(){
let a=["SOC","MEN","FIN","CAR","SID","BUS","HOB","SCH"];
let b=["PHY","LEA","APP","DIE","HOM","WOR","DAT"];

r1.innerHTML=a.map(x=>`<div class="card">${x}</div>`).join("");
r2.innerHTML=b.map(x=>`<div class="card">${x}</div>`).join("");
}

/* CHECKLIST */
function newList(){
state.checklists.push({tasks:[]});
save();render();
}

function addTask(i){
let t=prompt("task");
state.checklists[i].tasks.push({t,s:0});
save();render();
}

function set(i,j,v){
state.checklists[i].tasks[j].s=v;
save();render();
}

function renderCL(){
cl.innerHTML="";done.innerHTML="";
state.checklists.forEach((c,i)=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=`<button onclick="addTask(${i})">+</button>`;

c.tasks.forEach((t,j)=>{
let row=document.createElement("div");
row.innerHTML=`${t.t}
<button onclick="set(${i},${j},1)">✔</button>
<button onclick="set(${i},${j},-1)">❌</button>`;
if(t.s==1)row.className="green";
if(t.s==-1)row.className="red";
d.appendChild(row);
});

if(c.tasks.every(t=>t.s!=0))done.appendChild(d);
else cl.appendChild(d);
});
}

/* APPOINTMENTS */
function addAppt(){
state.appointments.push({t:atxt.value,d:adate.value});
save();render();
}

function renderAppt(){
alist.innerHTML="";
state.appointments.forEach(a=>{
alist.innerHTML+=a.d+" "+a.t+"<br>";
});
}

/* CALENDAR */
function renderCal(){
cal.innerHTML="";
for(let i=1;i<=30;i++){
let d=document.createElement("div");
d.className="day";
d.innerHTML=i;

state.appointments.forEach(a=>{
if(a.d.endsWith("-"+String(i).padStart(2,"0")))
d.innerHTML+="<div style='color:red'>"+a.t+"</div>";
});

cal.appendChild(d);
}
}

/* PROFILE */
function renderProfile(){
combat.innerText="Combat Level (cb): 3";
}

/* RENDER */
function render(){
renderSkills();
renderMap();
renderCL();
renderAppt();
renderCal();
renderProfile();
}

/* START */
init();

</script>

</body>
</html>
