<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GoGetta GG</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f17;
  color:white;
}

/* ---------- AUTH ---------- */
.authScreen{
  position:fixed;
  inset:0;
  background:#0b0f17;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.authBox{
  background:#111827;
  padding:30px;
  border-radius:16px;
  width:300px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.authBox input{
  padding:10px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
}
.authBtns{
  display:flex;
  gap:10px;
}
.authBtns button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

/* ---------- NAV ---------- */
.nav{
  display:flex;
  gap:8px;
  padding:10px;
  flex-wrap:wrap;
}
.nav button{
  padding:8px 12px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:white;
}

/* ---------- CONTENT ---------- */
.tab{
  display:none;
  padding:15px;
}
.active{
  display:block;
}

/* ---------- CARDS ---------- */
.card{
  background:#111827;
  padding:12px;
  border-radius:12px;
  margin:6px 0;
}

/* ---------- CHECKLIST ---------- */
.checkItem{
  display:flex;
  justify-content:space-between;
  margin:4px 0;
}
.green{color:#22c55e;}
.red{color:#ef4444;}

/* ---------- CALENDAR ---------- */
.day{
  border:1px solid #333;
  padding:10px;
  min-height:80px;
}

/* ---------- SKILLSMAP ---------- */
.row{
  display:flex;
  overflow-x:auto;
  gap:10px;
}
.skillBox{
  min-width:200px;
  background:#111827;
  padding:10px;
  border-radius:10px;
}

/* ---------- RIGHT PANEL ---------- */
.flex{
  display:flex;
  gap:20px;
}
.right{
  width:40%;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen" class="authScreen">
  <div class="authBox">
    <h2>GoGetta GG</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <div class="authBtns">
      <button onclick="login()">Login</button>
      <button onclick="register()">Register</button>
    </div>
    <div id="msg"></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('profile')">👤 Profile</button>
  <button onclick="showTab('mainskills')">📊 Skills</button>
  <button onclick="showTab('skillsmap')">🧭 Map</button>
  <button onclick="showTab('missions')">🎯 Missions</button>
  <button onclick="showTab('habits')">♻️ Habits</button>
  <button onclick="showTab('goals')">🏆 Goals</button>
  <button onclick="showTab('calendar')">📅 Calendar</button>
  <button onclick="showTab('appointments')">📍 Appointments</button>
  <button onclick="showTab('checklists')">✅ Checklists</button>
  <button onclick="showTab('investments')">💰 Investments</button>
  <button onclick="showTab('notes')">📝 Notes</button>
  <button onclick="logout()">🚪</button>
</div>

<!-- PROFILE -->
<div id="profile" class="tab active">
  <h2>Profile</h2>
  <div id="combat"></div>
</div>

<!-- SKILLSMAP -->
<div id="skillsmap" class="tab">
  <h2>Skills Map</h2>

  <div class="row" id="row1"></div>
  <div class="row" id="row2"></div>
</div>

<!-- APPOINTMENTS -->
<div id="appointments" class="tab">
  <h2>Appointments</h2>
  <input id="apptText">
  <input type="date" id="apptDate">
  <button onclick="addAppointment()">Add</button>
  <div id="apptList"></div>
</div>

<!-- CHECKLIST -->
<div id="checklists" class="tab">
  <h2>Checklists</h2>

  <div class="flex">
    <div>
      <button onclick="addChecklist()">+ Checklist</button>
      <div id="listContainer"></div>
    </div>

    <div class="right">
      <h3>Finished</h3>
      <div id="finishedLists"></div>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="tab">
  <h2>Calendar</h2>
  <div id="calendarGrid"></div>
</div>

<!-- NOTES -->
<div id="notes" class="tab">
  <textarea id="noteArea" style="width:100%;height:200px"></textarea>
  <button onclick="saveNotes()">Save</button>
</div>

<script>

/* ---------- STATE ---------- */
let state={
  checklists:[],
  appointments:[],
  notes:""
};

/* ---------- AUTH ---------- */
let currentUser=null;

function initAuth(){
  let u=localStorage.getItem("user");
  if(u){
    currentUser=u;
    load();
    authScreen.style.display="none";
  }
}

function register(){
  let users=JSON.parse(localStorage.getItem("users")||"{}");
  users[user.value]={pass:pass.value,data:null};
  localStorage.setItem("users",JSON.stringify(users));
  msg.innerText="Registered";
}

function login(){
  let users=JSON.parse(localStorage.getItem("users")||"{}");
  if(users[user.value] && users[user.value].pass===pass.value){
    currentUser=user.value;
    localStorage.setItem("user",currentUser);
    load();
    authScreen.style.display="none";
  } else msg.innerText="Wrong";
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* ---------- SAVE LOAD ---------- */
function save(){
  let users=JSON.parse(localStorage.getItem("users")||"{}");
  users[currentUser].data=state;
  localStorage.setItem("users",JSON.stringify(users));
}
function load(){
  let users=JSON.parse(localStorage.getItem("users")||"{}");
  if(users[currentUser].data) state=users[currentUser].data;
  renderAll();
}

/* ---------- TABS ---------- */
function showTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ---------- CHECKLIST ---------- */
function addChecklist(){
  state.checklists.push({name:"New",tasks:[],done:false});
  save(); renderAll();
}

function addTask(i){
  let t=prompt("Task");
  state.checklists[i].tasks.push({text:t,status:0});
  save(); renderAll();
}

function setTask(i,j,val){
  state.checklists[i].tasks[j].status=val;
  save(); renderAll();
}

function renderChecklists(){
  listContainer.innerHTML="";
  finishedLists.innerHTML="";

  state.checklists.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${c.name}</b>
      <button onclick="addTask(${i})">+</button>
    `;

    c.tasks.forEach((t,j)=>{
      let d=document.createElement("div");
      d.className="checkItem";
      d.innerHTML=`
        ${t.text}
        <div>
          <button onclick="setTask(${i},${j},1)">✔</button>
          <button onclick="setTask(${i},${j},-1)">❌</button>
        </div>
      `;
      if(t.status==1)d.classList.add("green");
      if(t.status==-1)d.classList.add("red");

      div.appendChild(d);
    });

    if(c.tasks.every(t=>t.status!=0)){
      finishedLists.appendChild(div);
    } else listContainer.appendChild(div);
  });
}

/* ---------- APPOINTMENTS ---------- */
function addAppointment(){
  state.appointments.push({
    text:apptText.value,
    date:apptDate.value
  });
  save(); renderAll();
}

function renderAppointments(){
  apptList.innerHTML="";
  state.appointments.forEach(a=>{
    apptList.innerHTML+=`<div>${a.date} - ${a.text}</div>`;
  });
}

/* ---------- CALENDAR ---------- */
function renderCalendar(){
  calendarGrid.innerHTML="";
  for(let i=1;i<=30;i++){
    let d=document.createElement("div");
    d.className="day";
    d.innerHTML=i;

    state.appointments.forEach(a=>{
      if(a.date.endsWith("-"+String(i).padStart(2,"0"))){
        d.innerHTML+=`<div style="color:red">${a.text}</div>`;
      }
    });

    calendarGrid.appendChild(d);
  }
}

/* ---------- NOTES ---------- */
function saveNotes(){
  state.notes=noteArea.value;
  save();
}

/* ---------- SKILLSMAP ---------- */
function renderSkillsMap(){
  let r1=["SOC","MEN","FIN","CAR","SID","BUS","HOB","SCH"];
  let r2=["PHY","LEA","APP","DIE","HOM","WOR","DAT"];

  row1.innerHTML=r1.map(s=>`<div class="skillBox">${s}</div>`).join("");
  row2.innerHTML=r2.map(s=>`<div class="skillBox">${s}</div>`).join("");
}

/* ---------- PROFILE ---------- */
function renderProfile(){
  combat.innerText="Combat Level (cb): 3";
}

/* ---------- RENDER ---------- */
function renderAll(){
  renderChecklists();
  renderAppointments();
  renderCalendar();
  renderSkillsMap();
  renderProfile();
}

/* ---------- START ---------- */
initAuth();

</script>

</body>
</html>
